<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Qingli Peptide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../supabase-config.js?v=7.0"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-dark: #020817;
            --accent-cyan: #0bbed6;
            --accent-blue: #0284c7;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-glass: rgba(255,255,255,0.08);
            --success-green: #10b981;
            --danger-red: #ef4444;
            --font-primary: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            background: var(--bg-dark);
            font-family: var(--font-body);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Animated background */
        .bg-scene {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(11,190,214,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(2,132,199,0.08) 0%, transparent 60%),
                        #020817;
            z-index: 0;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: drift 12s ease-in-out infinite;
            z-index: 0;
        }
        .orb-1 { width: 500px; height: 500px; background: #0bbed6; top: -200px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: #0284c7; bottom: -150px; right: -100px; animation-delay: -4s; }
        .orb-3 { width: 300px; height: 300px; background: #10b981; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* Login Container */
        .login-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background: rgba(10, 20, 40, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(11,190,214,0.15);
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(11,190,214,0.1);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .brand-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #0284c7, #0bbed6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 0 40px rgba(11,190,214,0.4);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(11,190,214,0.4); }
            50% { box-shadow: 0 0 60px rgba(11,190,214,0.6), 0 0 100px rgba(11,190,214,0.2); }
        }
        .brand-icon i { font-size: 1.75rem; color: #fff; }
        .brand-label {
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            font-weight: 700;
            font-family: var(--font-primary);
            margin-bottom: 0.25rem;
        }
        .brand-title {
            font-family: var(--font-primary);
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
        }
        .brand-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Form */
        .field {
            margin-bottom: 1.25rem;
        }
        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .field label i {
            color: var(--accent-cyan);
            margin-right: 0.4rem;
        }
        .field-wrap {
            position: relative;
        }
        .field input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            padding: 0.875rem 1rem;
            font-size: 0.95rem;
            color: var(--text-main);
            font-family: var(--font-body);
            transition: all 0.2s ease;
            outline: none;
        }
        .field input:focus {
            border-color: var(--accent-cyan);
            background: rgba(11,190,214,0.05);
            box-shadow: 0 0 0 3px rgba(11,190,214,0.1);
        }
        .field input::placeholder { color: rgba(148,163,184,0.5); }
        .eye-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: var(--accent-cyan); }

        /* Error */
        .error-box {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 0.75rem;
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            color: #fca5a5;
        }
        .error-box i { margin-right: 0.4rem; }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 0.875rem;
            background: linear-gradient(135deg, #0284c7, #0bbed6);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font-primary);
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 24px rgba(11,190,214,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(11,190,214,0.45);
        }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Footer note */
        .security-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.72rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
        .security-note i { margin-right: 0.3rem; }

        /* Back link */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent-cyan); }
        .back-link i { margin-right: 0.3rem; }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-glass);
        }
    </style>
</head>
<body>
    <div class="bg-scene"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- Brand Header -->
            <div class="brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-dna"></i>
                </div>
                <div class="brand-label">Qingli Peptide</div>
                <div class="brand-title">Admin Portal</div>
                <div class="brand-sub">Secure dashboard access for administrators only</div>
            </div>

            <!-- Error Message -->
            <div id="loginError" class="error-box">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="loginErrorText">Invalid credentials.</span>
            </div>

            <!-- Login Form -->
            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="field">
                    <label><i class="fa-solid fa-envelope"></i>Email Address</label>
                    <input type="email" id="adminEmail" placeholder="admin@qinglipeptide.com" required autocomplete="email">
                </div>
                <div class="field">
                    <label><i class="fa-solid fa-lock"></i>Password</label>
                    <div class="field-wrap">
                        <input type="password" id="adminPassword" placeholder="••••••••" required autocomplete="current-password" style="padding-right:3rem;">
                        <button type="button" class="eye-btn" onclick="togglePwd(this)" tabindex="-1">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">
                    <i class="fa-solid fa-arrow-right-to-bracket" id="loginIcon"></i>
                    <span id="loginBtnText">ACCESS DASHBOARD</span>
                </button>
            </form>

            <div class="divider">Restricted Access</div>

            <div class="security-note">
                <i class="fa-solid fa-shield-halved"></i>
                This portal is for authorized administrators only. All actions are logged and monitored.
            </div>

            <a href="../index.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i>Return to Storefront
            </a>
        </div>
    </div>

    <script>
        // If already authenticated as admin, skip login
        (async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && session.user?.user_metadata?.role === 'admin') {
                window.location.href = 'index.html';
            }
        })();

        async function handleAdminLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const icon = document.getElementById('loginIcon');
            const errBox = document.getElementById('loginError');
            const errText = document.getElementById('loginErrorText');

            // Loading state
            btn.disabled = true;
            icon.className = 'fa-solid fa-spinner fa-spin';
            btnText.textContent = 'AUTHENTICATING...';
            errBox.style.display = 'none';

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                if (error) {
                    showError(error.message);
                } else {
                    const role = data.user?.user_metadata?.role;
                    if (role === 'admin') {
                        // Clear any old dev bypass
                        localStorage.removeItem('admin_dev_bypass');
                        icon.className = 'fa-solid fa-check';
                        btnText.textContent = 'ACCESS GRANTED';
                        btn.style.background = 'linear-gradient(135deg, #059669, #10b981)';
                        setTimeout(() => { window.location.href = 'index.html'; }, 800);
                    } else {
                        // Signed in but not admin
                        await supabaseClient.auth.signOut();
                        showError('Your account does not have administrator privileges.');
                    }
                }
            } catch(err) {
                showError('Connection error. Please check your internet and try again.');
            }
        }

        function showError(msg) {
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const icon = document.getElementById('loginIcon');
            const errBox = document.getElementById('loginError');
            const errText = document.getElementById('loginErrorText');

            errText.textContent = msg;
            errBox.style.display = 'block';
            btn.disabled = false;
            icon.className = 'fa-solid fa-arrow-right-to-bracket';
            btnText.textContent = 'ACCESS DASHBOARD';

            // Shake animation
            const card = document.querySelector('.login-card');
            card.style.animation = 'none';
            card.style.transform = 'translateX(-8px)';
            setTimeout(() => { card.style.transform = 'translateX(8px)'; }, 80);
            setTimeout(() => { card.style.transform = 'translateX(-6px)'; }, 160);
            setTimeout(() => { card.style.transform = 'translateX(0)'; }, 240);
        }

        function togglePwd(btn) {
            const inp = btn.previousElementSibling;
            const isPass = inp.type === 'password';
            inp.type = isPass ? 'text' : 'password';
            btn.querySelector('i').className = isPass ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        }
    </script>
</body>
</html>
